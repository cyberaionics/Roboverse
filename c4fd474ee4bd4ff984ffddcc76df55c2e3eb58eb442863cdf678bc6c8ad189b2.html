<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/admin.css" />
  <style>
    body.no-grid .backdrop::before { display: none; }
    #root { min-height: 100vh; }
  </style>
</head>
<body class="admin">
  <div class="backdrop"></div>
  <div class="grain"></div>
  <div id="root"></div>

  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="#101417"/>
      <rect x="34" y="44" width="32" height="22" rx="3" fill="none" stroke="#5fe0e8" stroke-width="2"/>
      <circle cx="50" cy="40" r="9" fill="none" stroke="#9cf04a" stroke-width="2"/>
      <rect x="46" y="52" width="8" height="6" fill="#5fe0e8"/>
    </svg>
  </template>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Supabase client (only used when live keys are configured) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>

  <!-- config → store (plain JS, run first) -->
  <script src="supabase-config.js"></script>
  <script src="js/store.js"></script>

  <!-- data defaults (provides window.PROJECTS etc. for seeding) -->
  <script type="text/babel" src="js/data.jsx"></script>

  <!-- console app -->
  <script type="text/babel" src="js/admin-forms.jsx"></script>
  <script type="text/babel" src="js/admin.jsx"></script>
</body>
</html>
